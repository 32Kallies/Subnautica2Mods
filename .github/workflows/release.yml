name: Release Mods

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          set -euo pipefail
          git fetch --tags --force
          latest=$(git tag --list 'v*' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+$' | head -n1 || true)
          if [ -z "$latest" ]; then
            next="v1.0"
          else
            major=$(echo "$latest" | sed -E 's/^v([0-9]+)\.([0-9]+)$/\1/')
            minor=$(echo "$latest" | sed -E 's/^v([0-9]+)\.([0-9]+)$/\2/')
            if [ "$minor" -ge 9 ]; then
              major=$((major + 1))
              minor=0
            else
              minor=$((minor + 1))
            fi
            next="v${major}.${minor}"
          fi
          echo "version=$next" >> "$GITHUB_OUTPUT"
          echo "Next version: $next"

      - name: Zip each mod
        run: |
          set -euo pipefail
          mkdir -p artifacts
          shopt -s nullglob
          cd Mods
          for dir in */; do
            name="${dir%/}"
            safe_name=$(echo "$name" | tr -d "'\"" | tr ' ' '_')
            zip_path="../artifacts/${safe_name}.zip"
            echo "Zipping '$name' -> $zip_path"
            zip -rq "$zip_path" "$name"
          done
          ls -la ../artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: artifacts/*.zip
